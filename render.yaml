# Render static site routing configuration
# Generated: 2026-06-15T09:06:15.841Z
# This file configures URL rewrite rules for SPA routing

# Routes are applied when no static file exists at the requested path
# More specific routes should be listed before catch-all routes

routes:
  - type: rewrite
    source: /product/*
    destination: /product.html
  - type: rewrite
    source: /category/*
    destination: /category.html
  - type: rewrite
    source: /he/product/*
    destination: /he/product/index.html
  - type: rewrite
    source: /he/category/*
    destination: /he/category/index.html
  - type: rewrite
    source: /de/product/*
    destination: /de/product/index.html
  - type: rewrite
    source: /de/category/*
    destination: /de/category/index.html
  - type: rewrite
    source: /fr/product/*
    destination: /fr/product/index.html
  - type: rewrite
    source: /fr/category/*
    destination: /fr/category/index.html
